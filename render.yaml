services:
  - type: web
    name: ecommerce-platform-fastapi-api
    env: docker
    plan: free
    autoDeploy: true
    dockerfilePath: docker/api/Dockerfile
    preDeployCommand: alembic upgrade head
    healthCheckPath: /api/v1/health
    envVars:
      - key: ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ecommerce-platform-fastapi-db
          property: connectionString
      - key: LLM_ENABLED
        value: "false"

databases:
  - name: ecommerce-platform-fastapi-db
    plan: free
    databaseName: app
    user: postgres
